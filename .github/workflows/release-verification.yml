name: Release Verification

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify-release:
    name: Verify release hygiene
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run release verification script
        run: scripts/verify-release.sh

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: noctyra-sboms
          path: |
            PICCP Documentation/noctyra_sbom.json
            PICCP Documentation/noctyra_cyclonedx_sbom.json
          if-no-files-found: error

  container-scan:
    name: Build and scan relay container
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build relay container image
        run: |
          docker build \
            --build-arg LIBOQS_VERSION=0.15.0 \
            --tag noctyra-relay:ci \
            "PICCP Relay Server"

      - name: Scan relay container image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: noctyra-relay:ci
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          exit-code: "1"
