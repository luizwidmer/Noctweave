name: NoctweaveJS desktop release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: noctweavejs-desktop-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact: macos-arm64
            runner: macos-15
          - artifact: windows-x64
            runner: windows-2025
          - artifact: linux-x64
            runner: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install Linux WebView build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install locked dependencies
        working-directory: NoctweaveJS
        run: bun install --frozen-lockfile

      - name: Run tests
        working-directory: NoctweaveJS
        run: bun test

      - name: Type-check desktop shell
        working-directory: NoctweaveJS
        run: bun run typecheck:desktop

      - name: Regenerate native icons
        working-directory: NoctweaveJS
        run: bun run desktop:icons

      - name: Build native desktop package
        working-directory: NoctweaveJS
        run: bun run desktop:build

      - name: Generate checksums
        working-directory: NoctweaveJS
        run: bun run desktop:checksums
        env:
          NOCTWEAVE_DESKTOP_TARGET: ${{ matrix.artifact }}

      - name: Upload native package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: noctweavejs-${{ matrix.artifact }}
          path: NoctweaveJS/artifacts/*
          if-no-files-found: error
          retention-days: 14

  draft-release:
    name: Create draft release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Download native packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: noctweavejs-*
          path: release-artifacts
          merge-multiple: true

      - name: Attest release artifacts
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999 # v4
        with:
          subject-path: release-artifacts/**

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" --verify-tag --draft --title "NoctweaveJS ${GITHUB_REF_NAME}" --notes "Unsigned native testing builds. Verify the attached SHA-256 files and provenance attestations. Publishing remains subject to the repository release gates."
          fi
          gh release upload "${GITHUB_REF_NAME}" release-artifacts/* --clobber
