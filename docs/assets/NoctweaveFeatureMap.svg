<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="500" viewBox="0 0 1100 500" role="img" aria-labelledby="title desc">
  <title id="title">Noctweave base protocol and optional feature map</title>
  <desc id="desc">Base protocol steps and optional metadata-reduction and federation features.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#042f2e"/>
    </linearGradient>
    <linearGradient id="base" x1="0" x2="1">
      <stop offset="0" stop-color="#312e81"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1,1 L9,5 L1,9 Z" fill="#99f6e4"/>
    </marker>
  </defs>
  <rect width="1100" height="500" rx="28" fill="url(#bg)"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="60" y="64" fill="#f8fafc" font-size="30" font-weight="800">Base protocol path</text>
    <text x="60" y="300" fill="#f8fafc" font-size="30" font-weight="800">Optional layers</text>
  </g>
  <g fill="none" stroke="#99f6e4" stroke-width="3" marker-end="url(#arrow)">
    <path d="M218 150 H308"/>
    <path d="M448 150 H538"/>
    <path d="M678 150 H768"/>
    <path d="M908 150 H990"/>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <g>
      <rect x="60" y="105" width="160" height="92" rx="18" fill="url(#base)" stroke="#5eead4" opacity="0.9"/>
      <text x="140" y="142" fill="#ffffff" font-size="19" font-weight="700" text-anchor="middle">Identity</text>
      <text x="140" y="169" fill="#dbeafe" font-size="15" text-anchor="middle">ML-DSA keys</text>
    </g>
    <g>
      <rect x="310" y="105" width="140" height="92" rx="18" fill="url(#base)" stroke="#5eead4" opacity="0.9"/>
      <text x="380" y="142" fill="#ffffff" font-size="19" font-weight="700" text-anchor="middle">Prekeys</text>
      <text x="380" y="169" fill="#dbeafe" font-size="15" text-anchor="middle">ML-KEM setup</text>
    </g>
    <g>
      <rect x="540" y="105" width="140" height="92" rx="18" fill="url(#base)" stroke="#5eead4" opacity="0.9"/>
      <text x="610" y="142" fill="#ffffff" font-size="19" font-weight="700" text-anchor="middle">Envelope</text>
      <text x="610" y="169" fill="#dbeafe" font-size="15" text-anchor="middle">AEAD padded</text>
    </g>
    <g>
      <rect x="770" y="105" width="140" height="92" rx="18" fill="url(#base)" stroke="#5eead4" opacity="0.9"/>
      <text x="840" y="142" fill="#ffffff" font-size="19" font-weight="700" text-anchor="middle">Mailbox</text>
      <text x="840" y="169" fill="#dbeafe" font-size="15" text-anchor="middle">relay storage</text>
    </g>
    <g>
      <rect x="992" y="105" width="48" height="92" rx="18" fill="url(#base)" stroke="#5eead4" opacity="0.9"/>
      <text x="1016" y="158" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">✓</text>
    </g>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="700">
    <g>
      <rect x="60" y="330" width="185" height="70" rx="16" fill="#1e293b" stroke="#475569"/>
      <text x="152" y="372" fill="#c4b5fd" text-anchor="middle">Temporal buckets</text>
    </g>
    <g>
      <rect x="270" y="330" width="185" height="70" rx="16" fill="#1e293b" stroke="#475569"/>
      <text x="362" y="372" fill="#c4b5fd" text-anchor="middle">Hidden retrieval</text>
    </g>
    <g>
      <rect x="480" y="330" width="185" height="70" rx="16" fill="#1e293b" stroke="#475569"/>
      <text x="572" y="372" fill="#c4b5fd" text-anchor="middle">Onion packets</text>
    </g>
    <g>
      <rect x="690" y="330" width="185" height="70" rx="16" fill="#1e293b" stroke="#475569"/>
      <text x="782" y="372" fill="#c4b5fd" text-anchor="middle">Mixnet scheduling</text>
    </g>
    <g>
      <rect x="900" y="330" width="140" height="70" rx="16" fill="#1e293b" stroke="#475569"/>
      <text x="970" y="359" fill="#c4b5fd" text-anchor="middle">Federation</text>
      <text x="970" y="383" fill="#c4b5fd" text-anchor="middle">DHT/PEX</text>
    </g>
  </g>
  <text x="550" y="455" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17" text-anchor="middle">Optional layers are advertised only when enabled and usable; unsupported claims are intentionally suppressed.</text>
</svg>
