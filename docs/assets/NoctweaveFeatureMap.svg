<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">Noctweave protocol stack and optional capabilities</title>
  <desc id="desc">The required Noctweave foundation includes identity continuity, session establishment, encrypted messaging, and relay delivery. Optional capabilities add groups, attachment offload, federation discovery, and metadata reduction.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#09242a"/>
    </linearGradient>
    <linearGradient id="required" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#312e81"/>
      <stop offset="1" stop-color="#155e75"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="650" rx="30" fill="url(#background)"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="60" y="65" fill="#f8fafc" font-size="30" font-weight="750">One secure foundation, optional operational layers</text>
    <text x="60" y="98" fill="#94a3b8" font-size="17">The required path is interoperable. Optional capabilities are advertised only when enabled and usable.</text>

    <text x="60" y="153" fill="#c7d2fe" font-size="14" font-weight="700" letter-spacing="1.5">REQUIRED PROTOCOL FOUNDATION</text>
    <g>
      <rect x="60" y="175" width="1080" height="86" rx="20" fill="url(#required)" stroke="#67e8f9" stroke-opacity="0.55"/>
      <line x1="330" y1="190" x2="330" y2="246" stroke="#a5f3fc" stroke-opacity="0.25"/>
      <line x1="600" y1="190" x2="600" y2="246" stroke="#a5f3fc" stroke-opacity="0.25"/>
      <line x1="870" y1="190" x2="870" y2="246" stroke="#a5f3fc" stroke-opacity="0.25"/>

      <text x="195" y="211" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">Identity continuity</text>
      <text x="195" y="237" fill="#cbd5e1" font-size="14" text-anchor="middle">ML-DSA-65 signatures</text>
      <text x="465" y="211" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">Session establishment</text>
      <text x="465" y="237" fill="#cbd5e1" font-size="14" text-anchor="middle">ML-KEM-768 prekeys</text>
      <text x="735" y="211" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">Message protection</text>
      <text x="735" y="237" fill="#cbd5e1" font-size="14" text-anchor="middle">AES-256-GCM + ratchets</text>
      <text x="1005" y="211" fill="#fff" font-size="18" font-weight="700" text-anchor="middle">Relay delivery</text>
      <text x="1005" y="237" fill="#cbd5e1" font-size="14" text-anchor="middle">mailboxes + actor proofs</text>
    </g>

    <text x="60" y="315" fill="#a5f3fc" font-size="14" font-weight="700" letter-spacing="1.5">OPTIONAL CAPABILITIES</text>
    <g>
      <rect x="60" y="338" width="250" height="105" rx="18" fill="#151d31" stroke="#3b4b68"/>
      <text x="82" y="373" fill="#f8fafc" font-size="18" font-weight="700">Group messaging</text>
      <text x="82" y="402" fill="#94a3b8" font-size="14">signed membership commits</text>
      <text x="82" y="424" fill="#94a3b8" font-size="14">retained epoch recovery</text>

      <rect x="337" y="338" width="250" height="105" rx="18" fill="#151d31" stroke="#3b4b68"/>
      <text x="359" y="373" fill="#f8fafc" font-size="18" font-weight="700">Attachments</text>
      <text x="359" y="402" fill="#94a3b8" font-size="14">encrypted bounded chunks</text>
      <text x="359" y="424" fill="#94a3b8" font-size="14">TTL + optional IPFS offload</text>

      <rect x="614" y="338" width="250" height="105" rx="18" fill="#151d31" stroke="#3b4b68"/>
      <text x="636" y="373" fill="#f8fafc" font-size="18" font-weight="700">Federation</text>
      <text x="636" y="402" fill="#94a3b8" font-size="14">manual and curated routing</text>
      <text x="636" y="424" fill="#94a3b8" font-size="14">bounded open DHT / PEX</text>

      <rect x="891" y="338" width="250" height="105" rx="18" fill="#151d31" stroke="#3b4b68"/>
      <text x="913" y="373" fill="#f8fafc" font-size="18" font-weight="700">Metadata reduction</text>
      <text x="913" y="402" fill="#94a3b8" font-size="14">temporal buckets + PIR tools</text>
      <text x="913" y="424" fill="#94a3b8" font-size="14">onion and mixnet primitives</text>
    </g>

    <rect x="60" y="492" width="1080" height="104" rx="20" fill="#0f172a" stroke="#334155"/>
    <text x="88" y="530" fill="#f8fafc" font-size="17" font-weight="700">Security claim boundary</text>
    <text x="88" y="561" fill="#94a3b8" font-size="15">Noctweave reduces relay trust and supports metadata-reduction mechanisms. It does not claim global anonymity, hostile-OS resistance,</text>
    <text x="88" y="584" fill="#94a3b8" font-size="15">formal MLS equivalence, or guaranteed closed-app delivery on platforms that suspend clients.</text>
  </g>
</svg>
