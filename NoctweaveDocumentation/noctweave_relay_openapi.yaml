openapi: 3.1.0
info:
  title: Noctweave Relay API
  version: "1.0.0"
  description: |
    HTTP/WebSocket bridge for Noctweave Protocol relay requests. TCP uses the
    same RelayRequest and RelayResponse JSON objects as one newline-delimited
    request per connection. Opaque route v2 is the direct-delivery substrate;
    relays route fixed-size sealed packets without user or conversation state.
servers:
  - url: http://localhost:9340
    description: Local HTTP relay bridge
  - url: https://relay.example.org
    description: TLS relay bridge or reverse proxy
paths:
  /relay:
    post:
      summary: Submit one relay protocol request
      operationId: postRelayRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RelayRequest"
      responses:
        "200":
          description: Relay protocol response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelayResponse"
        "400":
          description: The body is not an exact, current RelayRequest envelope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPTransportError"
        "413":
          description: Request body exceeds the configured relay limit
        "429":
          description: Source request rate limit exceeded
        "502":
          description: Relay handler or upstream forwarding failed
    get:
      summary: WebSocket upgrade endpoint
      operationId: websocketRelay
      responses:
        "101":
          description: WebSocket upgrade accepted; clients exchange RelayRequest and RelayResponse JSON frames.
components:
  schemas:
    RelayRequest:
      type: object
      description: |
        Exact request-correlated protocol envelope. Every key is mandatory;
        authToken is explicitly null when unused. Module/version/method select
        exactly one body shape. Unknown keys and unsupported bindings are rejected.
      required: [requestID, module, version, method, body, authToken]
      properties:
        requestID:
          type: string
          format: uuid
        module:
          $ref: "#/components/schemas/RelayModuleID"
        version:
          type: integer
          minimum: 1
        method:
          $ref: "#/components/schemas/RelayMethodID"
        body:
          type: object
        authToken:
          type: [string, "null"]
          minLength: 1
          maxLength: 4096
          description: Optional relay password or coordinator registration token.
      additionalProperties: false
      allOf:
        - oneOf:
            - $ref: "#/components/schemas/CoreHealthRequestBinding"
            - $ref: "#/components/schemas/CoreInfoRequestBinding"
            - $ref: "#/components/schemas/OpaqueRouteCreateRequestBinding"
            - $ref: "#/components/schemas/OpaqueRouteRenewRequestBinding"
            - $ref: "#/components/schemas/OpaqueRouteTeardownRequestBinding"
            - $ref: "#/components/schemas/OpaqueRouteAppendRequestBinding"
            - $ref: "#/components/schemas/OpaqueRouteSyncRequestBinding"
            - $ref: "#/components/schemas/OpaqueRouteCommitRequestBinding"
            - $ref: "#/components/schemas/RendezvousRegisterRequestBinding"
            - $ref: "#/components/schemas/RendezvousAppendRequestBinding"
            - $ref: "#/components/schemas/RendezvousSyncRequestBinding"
            - $ref: "#/components/schemas/RendezvousDeleteRequestBinding"
            - $ref: "#/components/schemas/BlobUploadRequestBinding"
            - $ref: "#/components/schemas/BlobFetchRequestBinding"
            - $ref: "#/components/schemas/FederationRegisterRequestBinding"
            - $ref: "#/components/schemas/FederationListRequestBinding"
            - $ref: "#/components/schemas/FederationPublishDHTRequestBinding"
            - $ref: "#/components/schemas/FederationListDHTRequestBinding"
    RelayModuleID:
      type: string
      enum:
        - nw.core
        - nw.opaque-route
        - nw.rendezvous-transport
        - nw.blobs
        - nw.federation
    RelayMethodID:
      type: string
      enum: [health, info, create, renew, teardown, append, sync, commit, register, delete, upload, fetch, list, publish-dht, list-dht]
    RelayResponse:
      type: object
      description: |
        Exact response envelope. requestID, module, version, and method MUST
        equal the request. Success has a non-null operation body and null error;
        failure has null body and a bounded structured error.
      required: [requestID, module, version, method, status, body, error]
      properties:
        requestID:
          type: string
          format: uuid
        module:
          $ref: "#/components/schemas/RelayModuleID"
        version:
          type: integer
          minimum: 1
        method:
          $ref: "#/components/schemas/RelayMethodID"
        status:
          type: string
          enum: [success, error]
        body:
          oneOf:
            - $ref: "#/components/schemas/EmptyBody"
            - $ref: "#/components/schemas/RelayInfoSuccessBody"
            - $ref: "#/components/schemas/OpaqueRouteSuccessBody"
            - $ref: "#/components/schemas/OpaqueRouteAppendSuccessBody"
            - $ref: "#/components/schemas/OpaqueRouteSyncSuccessBody"
            - $ref: "#/components/schemas/OpaqueRouteCommitSuccessBody"
            - $ref: "#/components/schemas/RendezvousSyncSuccessBody"
            - $ref: "#/components/schemas/AttachmentSuccessBody"
            - $ref: "#/components/schemas/FederationNodesSuccessBody"
            - $ref: "#/components/schemas/DHTRecordsSuccessBody"
            - type: "null"
        error:
          oneOf:
            - $ref: "#/components/schemas/RelayErrorBody"
            - type: "null"
      additionalProperties: false
      oneOf:
        - properties:
            status:
              const: success
            body:
              oneOf:
                - $ref: "#/components/schemas/EmptyBody"
                - $ref: "#/components/schemas/RelayInfoSuccessBody"
                - $ref: "#/components/schemas/OpaqueRouteSuccessBody"
                - $ref: "#/components/schemas/OpaqueRouteAppendSuccessBody"
                - $ref: "#/components/schemas/OpaqueRouteSyncSuccessBody"
                - $ref: "#/components/schemas/OpaqueRouteCommitSuccessBody"
                - $ref: "#/components/schemas/RendezvousSyncSuccessBody"
                - $ref: "#/components/schemas/AttachmentSuccessBody"
                - $ref: "#/components/schemas/FederationNodesSuccessBody"
                - $ref: "#/components/schemas/DHTRecordsSuccessBody"
            error:
              type: "null"
        - properties:
            status:
              const: error
            body:
              type: "null"
            error:
              $ref: "#/components/schemas/RelayErrorBody"
    RelayErrorBody:
      type: object
      required: [code, message, retryable]
      properties:
        code:
          type: string
          enum: [authentication-required, rate-limited, invalid-request, unavailable, not-found, conflict, capacity, internal-failure]
        message:
          type: string
          minLength: 1
          maxLength: 512
          description: UTF-8 encoded length is limited to 512 bytes by implementations.
        retryable:
          type: boolean
      additionalProperties: false
    HTTPTransportError:
      type: object
      required: [error]
      properties:
        error:
          type: string
          maxLength: 512
      additionalProperties: false
    EmptyBody:
      type: object
      maxProperties: 0
      additionalProperties: false
    CoreHealthRequestBinding:
      type: object
      properties:
        module: { const: nw.core }
        version: { const: 2 }
        method: { const: health }
        body: { $ref: "#/components/schemas/EmptyBody" }
    CoreInfoRequestBinding:
      type: object
      properties:
        module: { const: nw.core }
        version: { const: 2 }
        method: { const: info }
        body: { $ref: "#/components/schemas/EmptyBody" }
    OpaqueRouteCreateRequestBinding:
      type: object
      properties:
        module: { const: nw.opaque-route }
        version: { const: 2 }
        method: { const: create }
        body: { $ref: "#/components/schemas/OpaqueRouteCreateSubmissionV2" }
    OpaqueRouteRenewRequestBinding:
      type: object
      properties:
        module: { const: nw.opaque-route }
        version: { const: 2 }
        method: { const: renew }
        body: { $ref: "#/components/schemas/OpaqueRouteRenewSubmissionV2" }
    OpaqueRouteTeardownRequestBinding:
      type: object
      properties:
        module: { const: nw.opaque-route }
        version: { const: 2 }
        method: { const: teardown }
        body: { $ref: "#/components/schemas/OpaqueRouteTeardownSubmissionV2" }
    OpaqueRouteAppendRequestBinding:
      type: object
      properties:
        module: { const: nw.opaque-route }
        version: { const: 2 }
        method: { const: append }
        body: { $ref: "#/components/schemas/OpaqueRouteAppendSubmissionV2" }
    OpaqueRouteSyncRequestBinding:
      type: object
      properties:
        module: { const: nw.opaque-route }
        version: { const: 2 }
        method: { const: sync }
        body: { $ref: "#/components/schemas/OpaqueRouteSyncSubmissionV2" }
    OpaqueRouteCommitRequestBinding:
      type: object
      properties:
        module: { const: nw.opaque-route }
        version: { const: 2 }
        method: { const: commit }
        body: { $ref: "#/components/schemas/OpaqueRouteCommitSubmissionV2" }
    RendezvousRegisterRequestBinding:
      type: object
      properties:
        module: { const: nw.rendezvous-transport }
        version: { const: 2 }
        method: { const: register }
        body: { $ref: "#/components/schemas/RegisterRendezvousTransportV2Request" }
    RendezvousAppendRequestBinding:
      type: object
      properties:
        module: { const: nw.rendezvous-transport }
        version: { const: 2 }
        method: { const: append }
        body: { $ref: "#/components/schemas/AppendRendezvousTransportV2Request" }
    RendezvousSyncRequestBinding:
      type: object
      properties:
        module: { const: nw.rendezvous-transport }
        version: { const: 2 }
        method: { const: sync }
        body: { $ref: "#/components/schemas/SyncRendezvousTransportV2Request" }
    RendezvousDeleteRequestBinding:
      type: object
      properties:
        module: { const: nw.rendezvous-transport }
        version: { const: 2 }
        method: { const: delete }
        body: { $ref: "#/components/schemas/DeleteRendezvousTransportV2Request" }
    BlobUploadRequestBinding:
      type: object
      properties:
        module: { const: nw.blobs }
        version: { const: 1 }
        method: { const: upload }
        body: { $ref: "#/components/schemas/UploadAttachmentRequest" }
    BlobFetchRequestBinding:
      type: object
      properties:
        module: { const: nw.blobs }
        version: { const: 1 }
        method: { const: fetch }
        body: { $ref: "#/components/schemas/FetchAttachmentRequest" }
    FederationRegisterRequestBinding:
      type: object
      properties:
        module: { const: nw.federation }
        version: { const: 1 }
        method: { const: register }
        body: { $ref: "#/components/schemas/FederationNodeRegistrationRequest" }
    FederationListRequestBinding:
      type: object
      properties:
        module: { const: nw.federation }
        version: { const: 1 }
        method: { const: list }
        body: { $ref: "#/components/schemas/ListFederationNodesRequest" }
    FederationPublishDHTRequestBinding:
      type: object
      properties:
        module: { const: nw.federation }
        version: { const: 1 }
        method: { const: publish-dht }
        body: { $ref: "#/components/schemas/PublishOpenFederationDHTRecordRequest" }
    FederationListDHTRequestBinding:
      type: object
      properties:
        module: { const: nw.federation }
        version: { const: 1 }
        method: { const: list-dht }
        body: { $ref: "#/components/schemas/ListOpenFederationDHTRecordsRequest" }
    RelayInfoSuccessBody:
      type: object
      required: [relayInfo]
      properties:
        relayInfo: { $ref: "#/components/schemas/RelayInfo" }
      additionalProperties: false
    OpaqueRouteSuccessBody:
      type: object
      required: [route]
      properties:
        route: { $ref: "#/components/schemas/OpaqueReceiveRouteV2" }
      additionalProperties: false
    OpaqueRouteAppendSuccessBody:
      type: object
      required: [receipt]
      properties:
        receipt: { $ref: "#/components/schemas/OpaqueRouteAppendReceiptV2" }
      additionalProperties: false
    OpaqueRouteSyncSuccessBody:
      type: object
      required: [batch]
      properties:
        batch: { $ref: "#/components/schemas/OpaqueRouteSyncResponseV2" }
      additionalProperties: false
    OpaqueRouteCommitSuccessBody:
      type: object
      required: [commit]
      properties:
        commit: { $ref: "#/components/schemas/OpaqueRouteCommitResponseV2" }
      additionalProperties: false
    RendezvousSyncSuccessBody:
      type: object
      required: [batch]
      properties:
        batch: { $ref: "#/components/schemas/RendezvousRelaySyncBatchV2" }
      additionalProperties: false
    AttachmentSuccessBody:
      type: object
      required: [chunk]
      properties:
        chunk: { $ref: "#/components/schemas/AttachmentChunk" }
      additionalProperties: false
    FederationNodesSuccessBody:
      type: object
      required: [nodes, snapshot]
      properties:
        nodes:
          type: array
          items: { $ref: "#/components/schemas/FederationNodeRecord" }
        snapshot:
          oneOf:
            - $ref: "#/components/schemas/FederationDirectorySnapshot"
            - type: "null"
      additionalProperties: false
    DHTRecordsSuccessBody:
      type: object
      required: [records]
      properties:
        records:
          type: array
          items: { $ref: "#/components/schemas/OpenFederationDHTRecord" }
      additionalProperties: false
    OpaqueRouteOpaque32V2:
      type: object
      required: [rawValue]
      properties:
        rawValue:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
      additionalProperties: false
    OpaqueRouteCursorV2:
      type: object
      required: [rawValue]
      description: Relay-issued authenticated cursor. Clients treat it as an opaque 68-byte value.
      properties:
        rawValue:
          type: string
          contentEncoding: base64
          minLength: 92
          maxLength: 92
      additionalProperties: false
    OpaqueRouteAuthorizationProofV2:
      type: object
      required: [authority, nonce, operationDigest, authorizedAt, mac]
      properties:
        authority:
          type: string
          enum: [send, read, renew, teardown]
        nonce:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        operationDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        authorizedAt:
          type: string
          format: date-time
        mac:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
      additionalProperties: false
    OpaqueRoutePolicyV2:
      type: object
      required: [paddingBucket, retentionBucket, quotaBucket, transportRequirement]
      properties:
        paddingBucket:
          type: integer
          enum: [4096, 16384, 65536]
        retentionBucket:
          type: integer
          enum: [3600, 21600, 86400, 604800]
        quotaBucket:
          type: integer
          enum: [64, 256, 1024]
        transportRequirement:
          type: string
          const: confidentialAuthenticated
      additionalProperties: false
    OpaqueRouteLeaseV2:
      type: object
      required: [issuedAt, lastRenewedAt, expiresAt, renewalSequence, policy]
      properties:
        issuedAt:
          type: string
          format: date-time
        lastRenewedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        renewalSequence:
          type: integer
          format: uint64
          minimum: 0
        policy:
          $ref: "#/components/schemas/OpaqueRoutePolicyV2"
      additionalProperties: false
    OpaqueRouteCreateRequestV2:
      type: object
      required:
        [version, routeID, sendCapabilityDigest, readCredentialDigest,
         renewCapabilityDigest, teardownCapabilityDigest, lease, idempotencyKey, authorization]
      properties:
        version:
          type: integer
          const: 2
        routeID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        sendCapabilityDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        readCredentialDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        renewCapabilityDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        teardownCapabilityDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        lease:
          $ref: "#/components/schemas/OpaqueRouteLeaseV2"
        idempotencyKey:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        authorization:
          $ref: "#/components/schemas/OpaqueRouteAuthorizationProofV2"
      additionalProperties: false
    OpaqueRouteRenewRequestV2:
      type: object
      required:
        [version, routeID, renewalSequence, previousTransitionDigest, newExpiry,
         authorizedAt, idempotencyKey, authorization]
      properties:
        version:
          type: integer
          const: 2
        routeID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        renewalSequence:
          type: integer
          format: uint64
          minimum: 1
        previousTransitionDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        newExpiry:
          type: string
          format: date-time
        authorizedAt:
          type: string
          format: date-time
        idempotencyKey:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        authorization:
          $ref: "#/components/schemas/OpaqueRouteAuthorizationProofV2"
      additionalProperties: false
    OpaqueRouteTeardownRequestV2:
      type: object
      required:
        [version, routeID, renewalSequence, previousTransitionDigest,
         authorizedAt, idempotencyKey, authorization]
      properties:
        version:
          type: integer
          const: 2
        routeID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        renewalSequence:
          type: integer
          format: uint64
          minimum: 0
        previousTransitionDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        authorizedAt:
          type: string
          format: date-time
        idempotencyKey:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        authorization:
          $ref: "#/components/schemas/OpaqueRouteAuthorizationProofV2"
      additionalProperties: false
    OpaqueRoutePacketV2:
      type: object
      required: [routeID, packetID, sealedFrame, authorization]
      description: |
        Fixed-size encrypted bytes. The relay validates only the outer fields,
        proof, selected size bucket, limits, and ordering; it never decrypts or
        interprets the sealed frame.
      properties:
        routeID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        packetID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        sealedFrame:
          oneOf:
            - type: string
              contentEncoding: base64
              minLength: 5464
              maxLength: 5464
            - type: string
              contentEncoding: base64
              minLength: 21848
              maxLength: 21848
            - type: string
              contentEncoding: base64
              minLength: 87384
              maxLength: 87384
        authorization:
          $ref: "#/components/schemas/OpaqueRouteAuthorizationProofV2"
      additionalProperties: false
    OpaqueRouteSyncRequestV2:
      type: object
      required: [routeID, requestID, limit, authorization]
      properties:
        routeID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        requestID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        after:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
        limit:
          type: integer
          minimum: 1
          maximum: 256
        authorization:
          $ref: "#/components/schemas/OpaqueRouteAuthorizationProofV2"
      additionalProperties: false
    OpaqueRouteCommitRequestV2:
      type: object
      required: [routeID, requestID, cursor, authorization]
      properties:
        routeID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        requestID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        cursor:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
        authorization:
          $ref: "#/components/schemas/OpaqueRouteAuthorizationProofV2"
      additionalProperties: false
    OpaqueRouteCreateSubmissionV2:
      type: object
      required: [request, renewCapability]
      properties:
        request:
          $ref: "#/components/schemas/OpaqueRouteCreateRequestV2"
        renewCapability:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
      additionalProperties: false
    OpaqueRouteRenewSubmissionV2:
      type: object
      required: [request, renewCapability]
      properties:
        request:
          $ref: "#/components/schemas/OpaqueRouteRenewRequestV2"
        renewCapability:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
      additionalProperties: false
    OpaqueRouteTeardownSubmissionV2:
      type: object
      required: [request, teardownCapability]
      properties:
        request:
          $ref: "#/components/schemas/OpaqueRouteTeardownRequestV2"
        teardownCapability:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
      additionalProperties: false
    OpaqueRouteAppendSubmissionV2:
      type: object
      required: [packet, sendCapability]
      properties:
        packet:
          $ref: "#/components/schemas/OpaqueRoutePacketV2"
        sendCapability:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
      additionalProperties: false
    OpaqueRouteSyncSubmissionV2:
      type: object
      required: [request, readCredential]
      properties:
        request:
          $ref: "#/components/schemas/OpaqueRouteSyncRequestV2"
        readCredential:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
      additionalProperties: false
    OpaqueRouteCommitSubmissionV2:
      type: object
      required: [request, readCredential]
      properties:
        request:
          $ref: "#/components/schemas/OpaqueRouteCommitRequestV2"
        readCredential:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
      additionalProperties: false
    OpaqueReceiveRouteV2:
      type: object
      required:
        [version, routeID, sendCapabilityDigest, readCredentialDigest,
         renewCapabilityDigest, teardownCapabilityDigest, lease, status,
         createdAt, creationIdempotencyKey, creationDigest,
         lastIdempotencyKey, lastTransitionDigest]
      properties:
        version:
          type: integer
          const: 2
        routeID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        sendCapabilityDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        readCredentialDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        renewCapabilityDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        teardownCapabilityDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        lease:
          $ref: "#/components/schemas/OpaqueRouteLeaseV2"
        status:
          type: string
          enum: [active, tornDown]
        createdAt:
          type: string
          format: date-time
        tornDownAt:
          type: string
          format: date-time
        creationIdempotencyKey:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        creationDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        lastIdempotencyKey:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        lastTransitionDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
      additionalProperties: false
    OpaqueRouteAppendReceiptV2:
      type: object
      required: [packetID, acceptedCursor, highWatermark]
      properties:
        packetID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        acceptedCursor:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
        highWatermark:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
      additionalProperties: false
    OpaqueRouteReceivedPacketV2:
      type: object
      required: [sequence, previousRecordDigest, recordDigest, routeRevision, packet]
      properties:
        sequence:
          type: integer
          format: uint64
          minimum: 1
        previousRecordDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        recordDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        routeRevision:
          type: integer
          format: uint64
          minimum: 0
        packet:
          $ref: "#/components/schemas/OpaqueRoutePacketV2"
      additionalProperties: false
    OpaqueRouteSyncResponseV2:
      type: object
      required: [packets, startsAfterSequence, startsAfterRecordDigest, nextSequence, nextRecordDigest, highWatermarkSequence, retentionFloorSequence, nextCursor, highWatermark, retentionFloor, hasMore]
      properties:
        packets:
          type: array
          maxItems: 256
          items:
            $ref: "#/components/schemas/OpaqueRouteReceivedPacketV2"
        startsAfterSequence:
          type: integer
          format: uint64
          minimum: 0
        startsAfterRecordDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        nextSequence:
          type: integer
          format: uint64
          minimum: 0
        nextRecordDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        highWatermarkSequence:
          type: integer
          format: uint64
          minimum: 0
        retentionFloorSequence:
          type: integer
          format: uint64
          minimum: 0
        nextCursor:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
        highWatermark:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
        retentionFloor:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
        hasMore:
          type: boolean
      additionalProperties: false
    OpaqueRouteCommitResponseV2:
      type: object
      required: [committedCursor, highWatermark, retentionFloor]
      properties:
        committedCursor:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
        highWatermark:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
        retentionFloor:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
      additionalProperties: false
    RendezvousRelayOpaque32V2:
      type: object
      required: [rawValue]
      description: |
        Nonzero 32-byte CSPRNG value. Depending on its typed request position,
        this is a route locator, opaque lane ID, publish bearer, read bearer,
        or delete bearer. All seven authority values in a registration MUST be
        distinct. Relays persist only domain-separated SHA-256 digests of
        bearers and never persist raw bearer values. Lane IDs are random labels
        and contain no purpose, identity, generation, endpoint, provider, or
        contact field.
      properties:
        rawValue:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
      additionalProperties: false
    RendezvousRelayFrameIDV2:
      type: object
      required: [rawValue]
      properties:
        rawValue:
          type: string
          contentEncoding: base64
          minLength: 24
          maxLength: 24
      additionalProperties: false
    RendezvousRelayLaneRegistrationV2:
      type: object
      required: [laneId, publishCapability, readCapability, deleteCapability]
      properties:
        laneId:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        publishCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        readCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        deleteCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
      additionalProperties: false
    RegisterRendezvousTransportV2Request:
      type: object
      required: [version, routeCapability, expiresAt, lanes]
      description: |
        Atomically creates exactly two unlabelled directional lanes. The route
        lifetime is a whole-second interval no longer than 600 seconds from
        receipt. An exact active-registration retry is idempotent, including
        after restart; different material under the same route conflicts.
        Deleted and expired routes retain bounded non-resurrection tombstones.
        This module is disabled by default and is accepted only over TLS or
        from a literal loopback development source.
      properties:
        version:
          type: integer
          const: 2
        routeCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        expiresAt:
          type: string
          format: date-time
        lanes:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: "#/components/schemas/RendezvousRelayLaneRegistrationV2"
      additionalProperties: false
    RendezvousRelayCiphertextFrameV2:
      type: object
      required: [frameId, sequence, ciphertext]
      description: |
        Relay-opaque encrypted bytes. The relay does not decode the enclosed
        RendezvousFrameV2. Decoded ciphertext length MUST be exactly 4096,
        16384, 65536, or 131072 bytes. The largest bucket wraps an already
        padded 65536-byte encrypted rendezvous frame without leaking its size.
      properties:
        frameId:
          $ref: "#/components/schemas/RendezvousRelayFrameIDV2"
        sequence:
          type: integer
          format: uint64
          minimum: 1
          maximum: 32
        ciphertext:
          type: string
          contentEncoding: base64
      additionalProperties: false
    AppendRendezvousTransportV2Request:
      type: object
      required: [routeCapability, laneId, publishCapability, frame]
      description: |
        Appends at the next exact lane sequence. Retrying the same frame ID,
        sequence, and ciphertext digest is idempotent. Reusing a frame ID with
        different bytes, reusing a sequence with a different ID, or creating a
        gap is rejected. Each lane is limited to 32 frames and 2097152 decoded
        ciphertext bytes.
      properties:
        routeCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        laneId:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        publishCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        frame:
          $ref: "#/components/schemas/RendezvousRelayCiphertextFrameV2"
      additionalProperties: false
    SyncRendezvousTransportV2Request:
      type: object
      required: [routeCapability, laneId, readCapability, afterSequence, maxCount]
      properties:
        routeCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        laneId:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        readCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        afterSequence:
          type: integer
          format: uint64
          minimum: 0
          maximum: 32
        maxCount:
          type: [integer, "null"]
          minimum: 1
          maximum: 32
      additionalProperties: false
    DeleteRendezvousTransportV2Request:
      type: object
      required: [routeCapability, laneId, deleteCapability]
      description: |
        Irreversibly deletes one lane using an authority distinct from its
        publish and read bearers. Exact deletion retries are idempotent. Once
        both lanes are deleted, the route is a non-resurrectable tombstone.
      properties:
        routeCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        laneId:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        deleteCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
      additionalProperties: false
    RendezvousRelaySyncBatchV2:
      type: object
      required: [frames, highWatermark, nextSequence, hasMore]
      properties:
        frames:
          type: array
          maxItems: 32
          items:
            $ref: "#/components/schemas/RendezvousRelayCiphertextFrameV2"
        highWatermark:
          type: integer
          format: uint64
          minimum: 0
          maximum: 32
        nextSequence:
          type: integer
          format: uint64
          minimum: 0
          maximum: 32
        hasMore:
          type: boolean
      additionalProperties: false
    RelayModuleCapabilityV2:
      type: object
      required: [module, versions, status, limits]
      properties:
        module:
          type: string
          pattern: "^nw\\."
          maxLength: 96
        versions:
          type: array
          minItems: 1
          maxItems: 8
          uniqueItems: true
          items:
            type: integer
            minimum: 1
            maximum: 65535
        status:
          type: string
          enum: [experimental, provisional, stable, deprecated]
        limits:
          type: object
          maxProperties: 32
          additionalProperties:
            type: integer
            format: uint64
            minimum: 0
      additionalProperties: false
    RelayCapabilityManifestV2:
      type: object
      required: [architectureVersion, modules]
      description: |
        Relay-terminated modules actually advertised by this relay. This is not
        an application-content capability manifest and does not authorize a
        silent protocol downgrade.
      properties:
        architectureVersion:
          type: integer
          const: 2
        modules:
          type: array
          minItems: 1
          maxItems: 64
          items:
            $ref: "#/components/schemas/RelayModuleCapabilityV2"
      additionalProperties: false
    RelayEndpoint:
      type: object
      required: [host, port]
      properties:
        host:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        useTLS:
          type: boolean
          default: false
        transport:
          type: string
          enum: [tcp, http, websocket]
          default: tcp
        tlsCertificateFingerprintSHA256:
          type: string
          contentEncoding: base64
        directorySigningPublicKey:
          type: string
          contentEncoding: base64
      additionalProperties: false
    EncryptedPayload:
      type: object
      required: [nonce, ciphertext, tag]
      properties:
        nonce: { type: string, contentEncoding: base64 }
        ciphertext: { type: string, contentEncoding: base64 }
        tag: { type: string, contentEncoding: base64 }
      additionalProperties: false
    UploadAttachmentRequest:
      type: object
      required: [attachmentId, chunkIndex, payload, ttlSeconds]
      properties:
        attachmentId: { type: string, format: uuid }
        chunkIndex: { type: integer, minimum: 0 }
        payload: { $ref: "#/components/schemas/EncryptedPayload" }
        ttlSeconds:
          type: [integer, "null"]
          minimum: 60
      additionalProperties: false
    FetchAttachmentRequest:
      type: object
      required: [attachmentId, chunkIndex]
      properties:
        attachmentId: { type: string, format: uuid }
        chunkIndex: { type: integer, minimum: 0 }
      additionalProperties: false
    AttachmentChunk:
      type: object
      required: [attachmentId, chunkIndex, payload]
      properties:
        attachmentId: { type: string, format: uuid }
        chunkIndex: { type: integer, minimum: 0 }
        payload: { $ref: "#/components/schemas/EncryptedPayload" }
      additionalProperties: false
    FederationNodeRegistrationRequest:
      type: object
      required: [endpoint, relayInfo, ttlSeconds]
      properties:
        endpoint: { $ref: "#/components/schemas/RelayEndpoint" }
        relayInfo: { $ref: "#/components/schemas/RelayInfo" }
        ttlSeconds:
          type: [integer, "null"]
          minimum: 1
      additionalProperties: false
    ListFederationNodesRequest:
      type: object
      required: [mode, federationName, onlyHealthy, maxStalenessSeconds, requireSignedSnapshot]
      properties:
        mode:
          type: [string, "null"]
          enum: [solo, manual, curated, open, null]
        federationName: { type: [string, "null"] }
        onlyHealthy: { type: [boolean, "null"] }
        maxStalenessSeconds:
          type: [integer, "null"]
          minimum: 1
        requireSignedSnapshot: { type: [boolean, "null"] }
      additionalProperties: false
    FederationNodeRecord:
      type: object
      required: [endpoint, relayInfo, lastHeartbeatAt, expiresAt]
      properties:
        endpoint: { $ref: "#/components/schemas/RelayEndpoint" }
        relayInfo: { $ref: "#/components/schemas/RelayInfo" }
        lastHeartbeatAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
      additionalProperties: false
    FederationDirectorySnapshot:
      type: object
      required: [version, mode, issuedAt, validUntil, maxStalenessSeconds, nodes]
      properties:
        version: { type: integer, const: 1 }
        mode: { type: string, enum: [solo, manual, curated, open] }
        federationName: { type: string }
        issuedAt: { type: string, format: date-time }
        validUntil: { type: string, format: date-time }
        maxStalenessSeconds: { type: integer, minimum: 1 }
        nodes:
          type: array
          items: { $ref: "#/components/schemas/FederationNodeRecord" }
        signatureAlgorithm: { type: string }
        signature: { type: string, contentEncoding: base64 }
      additionalProperties: false
    OpenFederationDHTRecord:
      type: object
      required: [version, namespace, relayIdentityDigest, endpoint, issuedAt, expiresAt, relaySigningPublicKey, signatureAlgorithm, signature]
      properties:
        version: { type: integer, const: 1 }
        namespace: { type: string }
        relayIdentityDigest: { type: string }
        endpoint: { $ref: "#/components/schemas/RelayEndpoint" }
        federationName: { type: string }
        issuedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        relaySigningPublicKey: { type: string, contentEncoding: base64 }
        signatureAlgorithm: { type: string, const: ML-DSA-65 }
        signature: { type: string, contentEncoding: base64 }
      additionalProperties: false
    PublishOpenFederationDHTRecordRequest:
      type: object
      required: [namespace, record]
      properties:
        namespace: { type: string }
        record: { $ref: "#/components/schemas/OpenFederationDHTRecord" }
      additionalProperties: false
    ListOpenFederationDHTRecordsRequest:
      type: object
      required: [namespace, limit]
      properties:
        namespace: { type: string }
        limit:
          type: [integer, "null"]
          minimum: 1
      additionalProperties: false
    RelayInfo:
      type: object
      properties:
        kind:
          type: string
          enum: [standard, discovery, bridge, privateRelay, coordinator]
        federation:
          type: object
        temporalBucketSeconds:
          type: integer
        temporalBucketScheduleSeconds:
          type: array
          items:
            type: integer
        attachmentDefaultTTLSeconds:
          type: integer
        attachmentMaxTTLSeconds:
          type: integer
        attachmentsEnabled:
          type: boolean
        attachmentStorageBackend:
          type: string
        hiddenRetrieval:
          type: object
        onionTransport:
          type: object
        mixnetTransport:
          type: object
        relayName:
          type: string
        operatorNote:
          type: string
        softwareVersion:
          type: string
          readOnly: true
          description: Binary-defined software identifier; not operator-controlled.
        protocolCapabilities:
          $ref: "#/components/schemas/RelayCapabilityManifestV2"
        requiresPassword:
          type: boolean
        tlsEnabled:
          type: boolean
        transport:
          type: string
          enum: [tcp, http, websocket]
        advertisedAt:
          type: string
          format: date-time
      additionalProperties: true
