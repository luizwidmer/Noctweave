openapi: 3.1.0
info:
  title: Noctweave Relay API
  version: "1.0.0"
  description: |
    HTTP/WebSocket bridge for Noctweave Protocol relay requests. TCP uses the
    same RelayRequest and RelayResponse JSON objects as one newline-delimited
    request per connection. Opaque route v2 is the direct-delivery substrate;
    relays route fixed-size sealed packets without user or conversation state.
servers:
  - url: http://localhost:9340
    description: Local HTTP relay bridge
  - url: https://relay.example.org
    description: TLS relay bridge or reverse proxy
paths:
  /health:
    get:
      summary: Health probe
      operationId: getHealth
      responses:
        "200":
          description: Relay is accepting requests
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/RelayResponse"
                  - type: object
                    properties:
                      status:
                        type: string
                        examples: ["ok"]
  /relay:
    post:
      summary: Submit one relay protocol request
      operationId: postRelayRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RelayRequest"
      responses:
        "200":
          description: Relay protocol response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelayResponse"
        "400":
          description: Malformed request or rejected relay operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelayResponse"
        "413":
          description: Request body exceeds the configured relay limit
        "429":
          description: Source request rate limit exceeded
        "502":
          description: Relay handler or upstream forwarding failed
    get:
      summary: WebSocket upgrade endpoint
      operationId: websocketRelay
      responses:
        "101":
          description: WebSocket upgrade accepted; clients exchange RelayRequest and RelayResponse JSON frames.
components:
  schemas:
    RelayRequest:
      type: object
      required: [type]
      properties:
        type:
          $ref: "#/components/schemas/RelayRequestType"
        authToken:
          type: string
          maxLength: 4096
          description: Optional relay password or coordinator registration token.
        createOpaqueRouteV2:
          $ref: "#/components/schemas/OpaqueRouteCreateSubmissionV2"
        renewOpaqueRouteV2:
          $ref: "#/components/schemas/OpaqueRouteRenewSubmissionV2"
        teardownOpaqueRouteV2:
          $ref: "#/components/schemas/OpaqueRouteTeardownSubmissionV2"
        appendOpaqueRouteV2:
          $ref: "#/components/schemas/OpaqueRouteAppendSubmissionV2"
        syncOpaqueRouteV2:
          $ref: "#/components/schemas/OpaqueRouteSyncSubmissionV2"
        commitOpaqueRouteV2:
          $ref: "#/components/schemas/OpaqueRouteCommitSubmissionV2"
        registerRendezvousTransportV2:
          $ref: "#/components/schemas/RegisterRendezvousTransportV2Request"
        appendRendezvousTransportV2:
          $ref: "#/components/schemas/AppendRendezvousTransportV2Request"
        syncRendezvousTransportV2:
          $ref: "#/components/schemas/SyncRendezvousTransportV2Request"
        deleteRendezvousTransportV2:
          $ref: "#/components/schemas/DeleteRendezvousTransportV2Request"
        uploadAttachment:
          type: object
        fetchAttachment:
          type: object
        registerFederationNode:
          type: object
        listFederationNodes:
          type: object
        publishOpenFederationDHTRecord:
          type: object
        listOpenFederationDHTRecords:
          type: object
      additionalProperties: false
    RelayRequestType:
      type: string
      enum:
        - createOpaqueRouteV2
        - renewOpaqueRouteV2
        - teardownOpaqueRouteV2
        - appendOpaqueRouteV2
        - syncOpaqueRouteV2
        - commitOpaqueRouteV2
        - registerRendezvousTransportV2
        - appendRendezvousTransportV2
        - syncRendezvousTransportV2
        - deleteRendezvousTransportV2
        - health
        - info
        - uploadAttachment
        - fetchAttachment
        - registerFederationNode
        - listFederationNodes
        - publishOpenFederationDHTRecord
        - listOpenFederationDHTRecords
    RelayResponse:
      type: object
      required: [type]
      properties:
        type:
          $ref: "#/components/schemas/RelayResponseType"
        rendezvousSyncV2:
          $ref: "#/components/schemas/RendezvousRelaySyncBatchV2"
        opaqueRouteV2:
          $ref: "#/components/schemas/OpaqueReceiveRouteV2"
        opaqueRouteAppendV2:
          $ref: "#/components/schemas/OpaqueRouteAppendReceiptV2"
        opaqueRouteSyncV2:
          $ref: "#/components/schemas/OpaqueRouteSyncResponseV2"
        opaqueRouteCommitV2:
          $ref: "#/components/schemas/OpaqueRouteCommitResponseV2"
        attachment:
          type: object
        federationNodes:
          type: array
          items:
            type: object
        federationSnapshot:
          type: object
        relayInfo:
          $ref: "#/components/schemas/RelayInfo"
        openFederationDHTRecords:
          type: array
          items:
            type: object
        error:
          type: string
          description: Stable human-readable rejection reason.
      additionalProperties: false
    RelayResponseType:
      type: string
      enum:
        - ok
        - rendezvousSyncV2
        - opaqueRouteV2
        - opaqueRouteAppendV2
        - opaqueRouteSyncV2
        - opaqueRouteCommitV2
        - attachment
        - federationNodes
        - info
        - openFederationDHTRecords
        - error
    OpaqueRouteOpaque32V2:
      type: object
      required: [rawValue]
      properties:
        rawValue:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
      additionalProperties: false
    OpaqueRouteCursorV2:
      type: object
      required: [rawValue]
      description: Relay-issued authenticated cursor. Clients treat it as an opaque 68-byte value.
      properties:
        rawValue:
          type: string
          contentEncoding: base64
          minLength: 92
          maxLength: 92
      additionalProperties: false
    OpaqueRouteAuthorizationProofV2:
      type: object
      required: [authority, nonce, operationDigest, authorizedAt, mac]
      properties:
        authority:
          type: string
          enum: [send, read, renew, teardown]
        nonce:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        operationDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        authorizedAt:
          type: string
          format: date-time
        mac:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
      additionalProperties: false
    OpaqueRoutePolicyV2:
      type: object
      required: [paddingBucket, retentionBucket, quotaBucket, transportRequirement]
      properties:
        paddingBucket:
          type: integer
          enum: [4096, 16384, 65536]
        retentionBucket:
          type: integer
          enum: [3600, 21600, 86400, 604800]
        quotaBucket:
          type: integer
          enum: [64, 256, 1024]
        transportRequirement:
          type: string
          const: confidentialAuthenticated
      additionalProperties: false
    OpaqueRouteLeaseV2:
      type: object
      required: [issuedAt, lastRenewedAt, expiresAt, renewalSequence, policy]
      properties:
        issuedAt:
          type: string
          format: date-time
        lastRenewedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        renewalSequence:
          type: integer
          format: uint64
          minimum: 0
        policy:
          $ref: "#/components/schemas/OpaqueRoutePolicyV2"
      additionalProperties: false
    OpaqueRouteCreateRequestV2:
      type: object
      required:
        [version, routeID, sendCapabilityDigest, readCredentialDigest,
         renewCapabilityDigest, teardownCapabilityDigest, lease, idempotencyKey, authorization]
      properties:
        version:
          type: integer
          const: 2
        routeID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        sendCapabilityDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        readCredentialDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        renewCapabilityDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        teardownCapabilityDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        lease:
          $ref: "#/components/schemas/OpaqueRouteLeaseV2"
        idempotencyKey:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        authorization:
          $ref: "#/components/schemas/OpaqueRouteAuthorizationProofV2"
      additionalProperties: false
    OpaqueRouteRenewRequestV2:
      type: object
      required:
        [version, routeID, renewalSequence, previousTransitionDigest, newExpiry,
         authorizedAt, idempotencyKey, authorization]
      properties:
        version:
          type: integer
          const: 2
        routeID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        renewalSequence:
          type: integer
          format: uint64
          minimum: 1
        previousTransitionDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        newExpiry:
          type: string
          format: date-time
        authorizedAt:
          type: string
          format: date-time
        idempotencyKey:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        authorization:
          $ref: "#/components/schemas/OpaqueRouteAuthorizationProofV2"
      additionalProperties: false
    OpaqueRouteTeardownRequestV2:
      type: object
      required:
        [version, routeID, renewalSequence, previousTransitionDigest,
         authorizedAt, idempotencyKey, authorization]
      properties:
        version:
          type: integer
          const: 2
        routeID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        renewalSequence:
          type: integer
          format: uint64
          minimum: 0
        previousTransitionDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        authorizedAt:
          type: string
          format: date-time
        idempotencyKey:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        authorization:
          $ref: "#/components/schemas/OpaqueRouteAuthorizationProofV2"
      additionalProperties: false
    OpaqueRoutePacketV2:
      type: object
      required: [routeID, packetID, sealedFrame, authorization]
      description: |
        Fixed-size encrypted bytes. The relay validates only the outer fields,
        proof, selected size bucket, limits, and ordering; it never decrypts or
        interprets the sealed frame.
      properties:
        routeID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        packetID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        sealedFrame:
          oneOf:
            - type: string
              contentEncoding: base64
              minLength: 5464
              maxLength: 5464
            - type: string
              contentEncoding: base64
              minLength: 21848
              maxLength: 21848
            - type: string
              contentEncoding: base64
              minLength: 87384
              maxLength: 87384
        authorization:
          $ref: "#/components/schemas/OpaqueRouteAuthorizationProofV2"
      additionalProperties: false
    OpaqueRouteSyncRequestV2:
      type: object
      required: [routeID, requestID, limit, authorization]
      properties:
        routeID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        requestID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        after:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
        limit:
          type: integer
          minimum: 1
          maximum: 256
        authorization:
          $ref: "#/components/schemas/OpaqueRouteAuthorizationProofV2"
      additionalProperties: false
    OpaqueRouteCommitRequestV2:
      type: object
      required: [routeID, requestID, cursor, authorization]
      properties:
        routeID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        requestID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        cursor:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
        authorization:
          $ref: "#/components/schemas/OpaqueRouteAuthorizationProofV2"
      additionalProperties: false
    OpaqueRouteCreateSubmissionV2:
      type: object
      required: [request, renewCapability]
      properties:
        request:
          $ref: "#/components/schemas/OpaqueRouteCreateRequestV2"
        renewCapability:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
      additionalProperties: false
    OpaqueRouteRenewSubmissionV2:
      type: object
      required: [request, renewCapability]
      properties:
        request:
          $ref: "#/components/schemas/OpaqueRouteRenewRequestV2"
        renewCapability:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
      additionalProperties: false
    OpaqueRouteTeardownSubmissionV2:
      type: object
      required: [request, teardownCapability]
      properties:
        request:
          $ref: "#/components/schemas/OpaqueRouteTeardownRequestV2"
        teardownCapability:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
      additionalProperties: false
    OpaqueRouteAppendSubmissionV2:
      type: object
      required: [packet, sendCapability]
      properties:
        packet:
          $ref: "#/components/schemas/OpaqueRoutePacketV2"
        sendCapability:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
      additionalProperties: false
    OpaqueRouteSyncSubmissionV2:
      type: object
      required: [request, readCredential]
      properties:
        request:
          $ref: "#/components/schemas/OpaqueRouteSyncRequestV2"
        readCredential:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
      additionalProperties: false
    OpaqueRouteCommitSubmissionV2:
      type: object
      required: [request, readCredential]
      properties:
        request:
          $ref: "#/components/schemas/OpaqueRouteCommitRequestV2"
        readCredential:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
      additionalProperties: false
    OpaqueReceiveRouteV2:
      type: object
      required:
        [version, routeID, sendCapabilityDigest, readCredentialDigest,
         renewCapabilityDigest, teardownCapabilityDigest, lease, status,
         createdAt, creationIdempotencyKey, creationDigest,
         lastIdempotencyKey, lastTransitionDigest]
      properties:
        version:
          type: integer
          const: 2
        routeID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        sendCapabilityDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        readCredentialDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        renewCapabilityDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        teardownCapabilityDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        lease:
          $ref: "#/components/schemas/OpaqueRouteLeaseV2"
        status:
          type: string
          enum: [active, tornDown]
        createdAt:
          type: string
          format: date-time
        tornDownAt:
          type: string
          format: date-time
        creationIdempotencyKey:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        creationDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
        lastIdempotencyKey:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        lastTransitionDigest:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
      additionalProperties: false
    OpaqueRouteAppendReceiptV2:
      type: object
      required: [packetID, acceptedCursor, highWatermark]
      properties:
        packetID:
          $ref: "#/components/schemas/OpaqueRouteOpaque32V2"
        acceptedCursor:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
        highWatermark:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
      additionalProperties: false
    OpaqueRouteReceivedPacketV2:
      type: object
      required: [routeRevision, packet]
      properties:
        routeRevision:
          type: integer
          format: uint64
          minimum: 0
        packet:
          $ref: "#/components/schemas/OpaqueRoutePacketV2"
      additionalProperties: false
    OpaqueRouteSyncResponseV2:
      type: object
      required: [packets, nextCursor, highWatermark, retentionFloor, hasMore]
      properties:
        packets:
          type: array
          maxItems: 256
          items:
            $ref: "#/components/schemas/OpaqueRouteReceivedPacketV2"
        nextCursor:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
        highWatermark:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
        retentionFloor:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
        hasMore:
          type: boolean
      additionalProperties: false
    OpaqueRouteCommitResponseV2:
      type: object
      required: [committedCursor, highWatermark, retentionFloor]
      properties:
        committedCursor:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
        highWatermark:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
        retentionFloor:
          $ref: "#/components/schemas/OpaqueRouteCursorV2"
      additionalProperties: false
    RendezvousRelayOpaque32V2:
      type: object
      required: [rawValue]
      description: |
        Nonzero 32-byte CSPRNG value. Depending on its typed request position,
        this is a route locator, opaque lane ID, publish bearer, read bearer,
        or delete bearer. All seven authority values in a registration MUST be
        distinct. Relays persist only domain-separated SHA-256 digests of
        bearers and never persist raw bearer values. Lane IDs are random labels
        and contain no purpose, identity, generation, endpoint, provider, or
        contact field.
      properties:
        rawValue:
          type: string
          contentEncoding: base64
          minLength: 44
          maxLength: 44
      additionalProperties: false
    RendezvousRelayFrameIDV2:
      type: object
      required: [rawValue]
      properties:
        rawValue:
          type: string
          contentEncoding: base64
          minLength: 24
          maxLength: 24
      additionalProperties: false
    RendezvousRelayLaneRegistrationV2:
      type: object
      required: [laneId, publishCapability, readCapability, deleteCapability]
      properties:
        laneId:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        publishCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        readCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        deleteCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
      additionalProperties: false
    RegisterRendezvousTransportV2Request:
      type: object
      required: [version, routeCapability, expiresAt, lanes]
      description: |
        Atomically creates exactly two unlabelled directional lanes. The route
        lifetime is a whole-second interval no longer than 600 seconds from
        receipt. An exact active-registration retry is idempotent, including
        after restart; different material under the same route conflicts.
        Deleted and expired routes retain bounded non-resurrection tombstones.
        This module is disabled by default and is accepted only over TLS or
        from a literal loopback development source.
      properties:
        version:
          type: integer
          const: 2
        routeCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        expiresAt:
          type: string
          format: date-time
        lanes:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: "#/components/schemas/RendezvousRelayLaneRegistrationV2"
      additionalProperties: false
    RendezvousRelayCiphertextFrameV2:
      type: object
      required: [frameId, sequence, ciphertext]
      description: |
        Relay-opaque encrypted bytes. The relay does not decode the enclosed
        RendezvousFrameV2. Decoded ciphertext length MUST be exactly 4096,
        16384, or 65536 bytes.
      properties:
        frameId:
          $ref: "#/components/schemas/RendezvousRelayFrameIDV2"
        sequence:
          type: integer
          format: uint64
          minimum: 1
          maximum: 32
        ciphertext:
          type: string
          contentEncoding: base64
      additionalProperties: false
    AppendRendezvousTransportV2Request:
      type: object
      required: [routeCapability, laneId, publishCapability, frame]
      description: |
        Appends at the next exact lane sequence. Retrying the same frame ID,
        sequence, and ciphertext digest is idempotent. Reusing a frame ID with
        different bytes, reusing a sequence with a different ID, or creating a
        gap is rejected. Each lane is limited to 32 frames and 2097152 decoded
        ciphertext bytes.
      properties:
        routeCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        laneId:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        publishCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        frame:
          $ref: "#/components/schemas/RendezvousRelayCiphertextFrameV2"
      additionalProperties: false
    SyncRendezvousTransportV2Request:
      type: object
      required: [routeCapability, laneId, readCapability, afterSequence]
      properties:
        routeCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        laneId:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        readCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        afterSequence:
          type: integer
          format: uint64
          minimum: 0
          maximum: 32
        maxCount:
          type: integer
          minimum: 1
          maximum: 32
      additionalProperties: false
    DeleteRendezvousTransportV2Request:
      type: object
      required: [routeCapability, laneId, deleteCapability]
      description: |
        Irreversibly deletes one lane using an authority distinct from its
        publish and read bearers. Exact deletion retries are idempotent. Once
        both lanes are deleted, the route is a non-resurrectable tombstone.
      properties:
        routeCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        laneId:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
        deleteCapability:
          $ref: "#/components/schemas/RendezvousRelayOpaque32V2"
      additionalProperties: false
    RendezvousRelaySyncBatchV2:
      type: object
      required: [frames, highWatermark, nextSequence, hasMore]
      properties:
        frames:
          type: array
          maxItems: 32
          items:
            $ref: "#/components/schemas/RendezvousRelayCiphertextFrameV2"
        highWatermark:
          type: integer
          format: uint64
          minimum: 0
          maximum: 32
        nextSequence:
          type: integer
          format: uint64
          minimum: 0
          maximum: 32
        hasMore:
          type: boolean
      additionalProperties: false
    RelayModuleCapabilityV2:
      type: object
      required: [module, versions, status, limits]
      properties:
        module:
          type: string
          pattern: "^nw\\."
          maxLength: 96
        versions:
          type: array
          minItems: 1
          maxItems: 8
          uniqueItems: true
          items:
            type: integer
            minimum: 1
            maximum: 65535
        status:
          type: string
          enum: [experimental, provisional, stable, deprecated]
        limits:
          type: object
          maxProperties: 32
          additionalProperties:
            type: integer
            format: uint64
            minimum: 0
      additionalProperties: false
    RelayCapabilityManifestV2:
      type: object
      required: [architectureVersion, modules]
      description: |
        Relay-terminated modules actually advertised by this relay. This is not
        an application-content capability manifest and does not authorize a
        silent protocol downgrade.
      properties:
        architectureVersion:
          type: integer
          const: 2
        modules:
          type: array
          minItems: 1
          maxItems: 64
          items:
            $ref: "#/components/schemas/RelayModuleCapabilityV2"
      additionalProperties: false
    RelayEndpoint:
      type: object
      required: [host, port]
      properties:
        host:
          type: string
        port:
          type: integer
          minimum: 1
          maximum: 65535
        useTLS:
          type: boolean
          default: false
        transport:
          type: string
          enum: [tcp, http, websocket]
          default: tcp
        tlsCertificateFingerprintSHA256:
          type: string
          contentEncoding: base64
        directorySigningPublicKey:
          type: string
          contentEncoding: base64
      additionalProperties: false
    RelayInfo:
      type: object
      properties:
        kind:
          type: string
          enum: [standard, discovery, bridge, archive, privateRelay, coordinator]
        federation:
          type: object
        temporalBucketSeconds:
          type: integer
        temporalBucketScheduleSeconds:
          type: array
          items:
            type: integer
        attachmentDefaultTTLSeconds:
          type: integer
        attachmentMaxTTLSeconds:
          type: integer
        attachmentsEnabled:
          type: boolean
        attachmentStorageBackend:
          type: string
        hiddenRetrieval:
          type: object
        onionTransport:
          type: object
        mixnetTransport:
          type: object
        wakeSupport:
          type: object
        relayName:
          type: string
        operatorNote:
          type: string
        softwareVersion:
          type: string
          readOnly: true
          description: Binary-defined software identifier; not operator-controlled.
        protocolCapabilities:
